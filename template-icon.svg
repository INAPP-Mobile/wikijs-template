<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E53B79"/><stop offset="100%" stop-color="#9F40FF"/>
    </linearGradient>
  </defs>
  <rect width="800" height="800" rx="120" fill="url(#bg)"/>
  <!-- Book icon -->
  <g transform="translate(400,400)">
    <!-- Left page -->
    <path d="M-75,-80 Q-55,-65 -35,-80 L-35,60 Q-55,75 -75,60 Z" stroke="#FFFFFF" stroke-width="14" fill="none" stroke-linejoin="round"/>
    <!-- Right page -->
    <path d="M35,-80 Q55,-65 75,-80 L75,60 Q55,75 35,60 Z" stroke="#FFFFFF" stroke-width="14" fill="none" stroke-linejoin="round"/>
    <!-- Spine -->
    <line x1="0" y1="-75" x2="0" y2="55" stroke="#FFFFFF" stroke-width="8"/>
    <!-- Text lines left -->
    <line x1="-55" y1="-30" x2="-40" y2="-30" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round"/>
    <line x1="-55" y1="-10" x2="-40" y2="-10" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round"/>
    <line x1="-55" y1="10" x2="-42" y2="10" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round"/>
    <!-- Text lines right -->
    <line x1="40" y1="-30" x2="55" y2="-30" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round"/>
    <line x1="40" y1="-10" x2="55" y2="-10" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round"/>
    <line x1="42" y1="10" x2="55" y2="10" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round"/>
  </g>
</svg>
